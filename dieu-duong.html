<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ONELAB — Điều dưỡng</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="logo-dot">OL</div>
    <div>
      <div class="brandname">ONELAB</div>
      <div class="pagetitle">Điều dưỡng — Lấy mẫu <span id="countBadge" style="display:none;background:var(--danger);color:#fff;border-radius:999px;padding:2px 9px;font-size:13px;vertical-align:middle;"></span></div>
    </div>
  </div>

  <div class="card" id="pinCard">
    <label class="first">Mã PIN Điều dưỡng</label>
    <input type="password" id="pin" inputmode="numeric" placeholder="••••">
    <label style="display:flex;align-items:center;gap:8px;font-weight:400;margin-top:10px;">
      <input type="checkbox" id="rememberMe" checked style="width:auto;">
      <span>Ghi nhớ trên máy này (mở lên là vào thẳng danh sách, không cần gõ lại PIN)</span>
    </label>
    <button class="btn" id="loadBtn">Vào danh sách</button>
    <div id="loginMsg"></div>
  </div>

  <div id="switchUserBox" style="display:none;text-align:right;margin-bottom:10px;">
    <a href="#" onclick="logoutNurse(); return false;" style="font-size:12.5px;color:var(--muted);">Không phải bạn? Đổi người dùng khác</a>
  </div>
  <div id="queue"></div>
</div>

<script src="config.js"></script>
<script>
let PIN = '';
let knownCodes = new Set();
let pollTimer = null;
const STORAGE_KEY = 'onelab_dieuduong_pin';
const NEXT_STEP = {
  3: { step: 'tiepnhan', label: 'Tiếp nhận đơn, đi lấy mẫu' },
  4: { step: 'daylaymau', label: 'Đã lấy mẫu xong' },
  5: { step: 'bangiao', label: 'Đã bàn giao mẫu cho Logistics' }
};

document.getElementById('loadBtn').addEventListener('click', () => {
  const remember = document.getElementById('rememberMe').checked;
  if (remember) localStorage.setItem(STORAGE_KEY, document.getElementById('pin').value.trim());
  else localStorage.removeItem(STORAGE_KEY);
  loadQueue(true);
});

function logoutNurse() {
  localStorage.removeItem(STORAGE_KEY);
  PIN = '';
  if (pollTimer) clearInterval(pollTimer);
  document.getElementById('pin').value = '';
  document.getElementById('pinCard').style.display = 'block';
  document.getElementById('switchUserBox').style.display = 'none';
  document.getElementById('queue').innerHTML = '';
  document.getElementById('countBadge').style.display = 'none';
}

// Tự động vào danh sách nếu đã lưu PIN trên máy này trước đó
(function autoLogin() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    document.getElementById('pin').value = saved;
    document.getElementById('pinCard').style.display = 'none';
    document.getElementById('switchUserBox').style.display = 'block';
    loadQueue(true);
  }
})();

async function loadQueue(isFirstLoad) {
  PIN = document.getElementById('pin').value.trim();
  const loginMsg = document.getElementById('loginMsg');
  loginMsg.innerHTML = '';
  if (!PIN) return;

  let res;
  try {
    res = await callApi('listQueue', { role: 'dieuduong', pin: PIN });
  } catch (err) {
    document.getElementById('pinCard').style.display = 'block';
    document.getElementById('switchUserBox').style.display = 'none';
    document.getElementById('queue').innerHTML = `<div class="msg err">Không kết nối được hệ thống. Kiểm tra lại config.js (URL Apps Script) hoặc mạng internet. (${err})</div>`;
    return;
  }
  if (!res.ok) {
    loginMsg.innerHTML = `<div class="msg err">${res.error}</div>`;
    document.getElementById('pinCard').style.display = 'block'; // PIN lưu bị sai -> hiện lại form nhập
    document.getElementById('switchUserBox').style.display = 'none';
    return;
  }
  loginMsg.innerHTML = `<div class="msg ok">Xin chào ${res.who}</div>`;
  checkNewBookings(res.data);
  renderQueue(res.data);

  if (isFirstLoad) {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(() => loadQueue(false), 20000);
    if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
  }
}

function checkNewBookings(list) {
  const currentCodes = new Set(list.map(b => b.maBooking + ':' + b.trangThai));
  if (knownCodes.size > 0) {
    const newOnes = list.filter(b => !Array.from(knownCodes).some(k => k.startsWith(b.maBooking + ':')));
    if (newOnes.length > 0) alertNewBooking(newOnes.length + ' booking mới được giao cho bạn');
  }
  knownCodes = currentCodes;
}

function alertNewBooking(text) {
  playBeep();
  document.title = '🔔 ' + text;
  setTimeout(() => { document.title = 'ONELAB — Điều dưỡng'; }, 8000);
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('ONELAB Điều dưỡng', { body: text });
  }
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880; g.gain.value = 0.15;
    o.start(); setTimeout(() => o.stop(), 220);
  } catch (e) {}
}

function renderQueue(list) {
  const q = document.getElementById('queue');
  const badge = document.getElementById('countBadge');
  if (list.length > 0) {
    badge.style.display = 'inline-block';
    badge.textContent = String(list.length).padStart(2, '0');
  } else {
    badge.style.display = 'none';
  }
  if (list.length === 0) {
    q.innerHTML = '<div class="card mint">Không có booking nào được giao. 🎉</div>';
    return;
  }
  q.innerHTML = list.map(itemHtml).join('');
}

function itemHtml(b) {
  const st = Number(b.trangThai);
  const next = NEXT_STEP[st];
  const billList = (b.billLinks || '').split(',').map(s => s.trim()).filter(Boolean);
  const chiDinhList = (b.chiDinhLinks || '').split(',').map(s => s.trim()).filter(Boolean);
  return `
  <div class="card">
    <strong>${b.maBooking}</strong>
    <div class="hint" style="margin-top:4px;">
      <strong style="color:var(--text);">${b.tenKH}</strong>${b.ngaySinh ? ' (' + b.ngaySinh + ')' : ''} · ${b.sdt}<br>
      ${b.diaChi}<br>
      Hẹn: ${b.ngayHen} ${b.khungGio}<br>Dự kiến: ${b.thoiGianDuKien || '—'}<br>Điều phối lúc: ${b.t3DieuPhoi || '—'}
    </div>

    <div class="card mint" style="margin-top:10px;padding:10px 14px;">
      <div class="hint" style="font-weight:700;color:var(--text);margin-bottom:4px;">Xét nghiệm cần chuẩn bị vật tư</div>
      <div style="font-size:13px;color:var(--text);">${b.dichVu || '—'}</div>
    </div>

    ${b.maBacSi ? `<div class="hint" style="margin-top:8px;">Mã bác sĩ: <strong style="color:var(--text);">${b.maBacSi}</strong></div>` : ''}
    ${b.hinhThucTraKQ ? `<div class="hint" style="margin-top:4px;">Trả KQ: <strong style="color:var(--text);">${b.hinhThucTraKQ}</strong>${b.emailKetQua ? ' — ' + b.emailKetQua : ''}</div>` : ''}

    ${chiDinhList.length > 0 ? `
      <div class="hint" style="margin-top:8px;">Ảnh phiếu chỉ định:
        ${chiDinhList.map((l, i) => `<a href="${l}" target="_blank" rel="noopener">Ảnh ${i + 1}</a>`).join(' · ')}
      </div>` : ''}

    ${billList.length > 0 ? `
      <div class="card" style="margin-top:8px;padding:10px 14px;border-color:var(--green-accent);">
        <div class="hint" style="font-weight:700;color:var(--text);margin-bottom:4px;">💵 Hoá đơn/Bill — thu tiền khách</div>
        ${billList.map((l, i) => `<div><a href="${l}" target="_blank" rel="noopener">Xem hoá đơn ${i + 1}</a></div>`).join('')}
      </div>` : ''}
    ${b.ghiChu ? `<div class="hint" style="margin-top:8px;font-style:italic;">Ghi chú Sale: ${b.ghiChu}</div>` : ''}
    ${next ? `<button class="btn" onclick="update('${b.maBooking}','${next.step}')">${next.label}</button>` : ''}
    <div id="msg-${b.maBooking}"></div>
  </div>`;
}

async function update(code, step) {
  const res = await callApi('nurseUpdate', { maBooking: code, pin: PIN, step });
  const el = document.getElementById('msg-' + code);
  el.innerHTML = res.ok ? `<div class="msg ok">${res.message}</div>` : `<div class="msg err">${res.error}</div>`;
  if (res.ok) setTimeout(loadQueue, 1400);
}
</script>
</body>
</html>
