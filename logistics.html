<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ONELAB — Logistics</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="logo-dot">OL</div>
    <div>
      <div class="brandname">ONELAB</div>
      <div class="pagetitle">Logistics — Nhập LIS <span id="countBadge" style="display:none;background:var(--danger);color:#fff;border-radius:999px;padding:2px 9px;font-size:13px;vertical-align:middle;"></span></div>
    </div>
  </div>

  <div class="card" id="pinCard">
    <label class="first">Mã PIN Logistics</label>
    <input type="password" id="pin" inputmode="numeric" placeholder="••••">
    <button class="btn" id="loadBtn">Vào danh sách</button>
    <div id="loginMsg"></div>
  </div>

  <div id="queue"></div>
</div>

<script src="config.js"></script>
<script>
let PIN = '';
let knownCodes = new Set();
let pollTimer = null;

async function showPublicCount() {
  try {
    const res = await callApi('getPublicCount', { role: 'logistics' });
    const badge = document.getElementById('countBadge');
    if (res.ok && res.count > 0) {
      badge.style.display = 'inline-block';
      badge.textContent = String(res.count).padStart(2, '0');
    } else {
      badge.style.display = 'none';
    }
  } catch (e) {}
}
showPublicCount();
let publicCountTimer = setInterval(showPublicCount, 20000);

document.getElementById('loadBtn').addEventListener('click', () => loadQueue(true));

async function loadQueue(isFirstLoad) {
  PIN = document.getElementById('pin').value.trim();
  const loginMsg = document.getElementById('loginMsg');
  loginMsg.innerHTML = '';
  if (!PIN) return;

  let res;
  try {
    res = await callApi('listQueue', { role: 'logistics', pin: PIN });
  } catch (err) {
    loginMsg.innerHTML = `<div class="msg err">Không kết nối được hệ thống. Kiểm tra lại config.js (URL Apps Script) hoặc mạng internet. (${err})</div>`;
    return;
  }
  if (!res.ok) {
    loginMsg.innerHTML = `<div class="msg err">${res.error}</div>`;
    return;
  }
  loginMsg.innerHTML = `<div class="msg ok">Xin chào ${res.who}</div>`;
  checkNewBookings(res.data);
  renderQueue(res.data);

  if (isFirstLoad) {
    if (publicCountTimer) clearInterval(publicCountTimer);
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(() => loadQueue(false), 20000);
    if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
  }
}

function checkNewBookings(list) {
  const currentCodes = new Set(list.map(b => b.maBooking + ':' + b.trangThai));
  if (knownCodes.size > 0) {
    const newOnes = list.filter(b => !Array.from(knownCodes).some(k => k.startsWith(b.maBooking + ':')));
    if (newOnes.length > 0) alertNewBooking(newOnes.length + ' mẫu mới chờ nhập LIS');
  }
  knownCodes = currentCodes;
}

function alertNewBooking(text) {
  playBeep();
  document.title = '🔔 ' + text;
  setTimeout(() => { document.title = 'ONELAB — Logistics'; }, 8000);
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('ONELAB Logistics', { body: text });
  }
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880; g.gain.value = 0.15;
    o.start(); setTimeout(() => o.stop(), 220);
  } catch (e) {}
}

function renderQueue(list) {
  const q = document.getElementById('queue');
  const badge = document.getElementById('countBadge');
  if (list.length > 0) {
    badge.style.display = 'inline-block';
    badge.textContent = String(list.length).padStart(2, '0');
  } else {
    badge.style.display = 'none';
  }
  if (list.length === 0) {
    q.innerHTML = '<div class="card mint">Không có mẫu nào đang chờ nhập LIS. 🎉</div>';
    return;
  }
  q.innerHTML = list.map(itemHtml).join('');
}

function itemHtml(b) {
  const isPriority = b.mucUuTien && b.mucUuTien !== 'Thường';
  const chiDinhList = (b.chiDinhLinks || '').split(',').map(s => s.trim()).filter(Boolean);
  const billList = (b.billLinks || '').split(',').map(s => s.trim()).filter(Boolean);
  const st = Number(b.trangThai);
  const waitingReceive = st === 20; // Thu mẫu — chờ Logistics xác nhận tiếp nhận

  return `
  <div class="card" style="${isPriority ? 'border-color:#C0392B;' : ''}">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <strong>${b.maBooking}</strong>
      ${isPriority ? `<span class="badge st-0">${b.mucUuTien}</span>` : `<span class="badge st-1">${b.trangThaiLabel}</span>`}
    </div>

    <div class="hint" style="margin-top:6px;">
      <strong style="color:var(--text);">${b.tenKH}</strong> · ${b.sdt}<br>
      ${b.diaChi}<br>
      Hình thức: ${b.hinhThuc} · Hẹn: ${b.ngayHen} ${b.khungGio}
    </div>

    <div class="card mint" style="margin-top:10px;padding:10px 14px;">
      <div class="hint" style="font-weight:700;color:var(--text);margin-bottom:4px;">Xét nghiệm / Chỉ số cần nhập</div>
      <div style="font-size:13px;color:var(--text);">${b.dichVu || '—'}</div>
    </div>

    ${b.maBacSi ? `<div class="hint" style="margin-top:8px;">Mã bác sĩ: <strong style="color:var(--text);">${b.maBacSi}</strong></div>` : ''}
    ${b.hinhThucTraKQ ? `<div class="hint" style="margin-top:4px;">Trả KQ: <strong style="color:var(--text);">${b.hinhThucTraKQ}</strong>${b.emailKetQua ? ' — ' + b.emailKetQua : ''}</div>` : ''}
    ${b.ghiChu ? `<div class="hint" style="margin-top:6px;font-style:italic;">Ghi chú Sale: ${b.ghiChu}</div>` : ''}

    ${chiDinhList.length > 0 ? `
      <div class="hint" style="margin-top:8px;">Ảnh phiếu chỉ định:
        ${chiDinhList.map((l, i) => `<a href="${l}" target="_blank" rel="noopener">Ảnh ${i + 1}</a>`).join(' · ')}
      </div>` : ''}
    ${billList.length > 0 ? `
      <div class="hint" style="margin-top:4px;">Hoá đơn/Bill:
        ${billList.map((l, i) => `<a href="${l}" target="_blank" rel="noopener">File ${i + 1}</a>`).join(' · ')}
      </div>` : ''}

    ${waitingReceive ? `
      <button class="btn" style="margin-top:14px;" onclick="confirmReceive('${b.maBooking}')">Xác nhận thu mẫu</button>
    ` : `
      <div class="hint" style="margin-top:8px;">
        ${st === 21
          ? `Tiếp nhận lúc: ${b.tiepNhan || '—'} (bởi ${b.nguoiTiepNhan || '—'})`
          : `Bàn giao lúc: ${b.banGiao || '—'} (bởi ${b.nguoiBanGiao || '—'})`}
      </div>
      <label style="margin-top:12px;">Mã PID</label>
      <input type="text" id="pid-${b.maBooking}" placeholder="VD: 10231">
      <label>Mã SID</label>
      <input type="text" id="sid-${b.maBooking}" placeholder="VD: 55892">
      <button class="btn" onclick="finish('${b.maBooking}')">Hoàn tất</button>
    `}
    <div id="msg-${b.maBooking}"></div>
  </div>`;
}

async function confirmReceive(code) {
  const res = await callApi('confirmThuMau', { maBooking: code, pin: PIN });
  const el = document.getElementById('msg-' + code);
  el.innerHTML = res.ok ? `<div class="msg ok">${res.message}</div>` : `<div class="msg err">${res.error}</div>`;
  if (res.ok) setTimeout(loadQueue, 1400);
}

async function finish(code) {
  const maPID = document.getElementById('pid-' + code).value;
  const maSID = document.getElementById('sid-' + code).value;
  const res = await callApi('enterSID', { maBooking: code, pin: PIN, maPID, maSID });
  const el = document.getElementById('msg-' + code);
  el.innerHTML = res.ok ? `<div class="msg ok">${res.message}</div>` : `<div class="msg err">${res.error}</div>`;
  if (res.ok) setTimeout(loadQueue, 1400);
}
</script>
</body>
</html>
